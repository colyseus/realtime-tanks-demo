<body>
  <h1>Realtime Tanks Demo</h1>
  <p class="subtitle">
    HTML5 builds — same server, different game engines
    &middot; <a href="https://github.com/colyseus/realtime-tanks-demo">GitHub</a>
    &middot; Powered by <a href="https://colyseus.io/">Colyseus</a>
  </p>
  <div class="grid" id="grid">
    <noscript>
      <a class="card" href="web-playcanvas/"><div class="label">PlayCanvas</div></a>
      <a class="card" href="gamemaker/"><div class="label">GameMaker</div></a>
      <a class="card" href="godot/"><div class="label">Godot</div></a>
      <a class="card" href="defold/"><div class="label">Defold</div></a>
      <a class="card" href="haxe/"><div class="label">Haxe + Heaps</div></a>
      <a class="card" href="unity/"><div class="label">Unity</div></a>
      <a class="card" href="web-threejs/"><div class="label">Three.js</div></a>
      <a class="card" href="construct3/"><div class="label">Construct 3</div></a>
    </noscript>
  </div>
  <script>
    const engines = [
      { dir: "web-playcanvas", name: "PlayCanvas" },
      { dir: "gamemaker", name: "GameMaker" },
      { dir: "godot", name: "Godot" },
      { dir: "defold", name: "Defold" },
      { dir: "haxe", name: "Haxe + Heaps" },
      { dir: "unity", name: "Unity" },
      { dir: "web-threejs", name: "Three.js" },
      { dir: "construct3", name: "Construct 3" },
    ];
    const grid = document.getElementById("grid");
    engines.forEach(e => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = e.dir + "/";
      const img = document.createElement("img");
      img.src = e.dir + "/screenshot.webp";
      img.alt = e.name;
      img.loading = "lazy";
      img.onerror = function() { this.style.display = "none"; };
      a.appendChild(img);
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = e.name;
      a.appendChild(label);
      // Check if directory exists by probing index.html
      fetch(e.dir + "/index.html", { method: "HEAD" })
        .then(r => { if (!r.ok) a.style.display = "none"; })
        .catch(() => { a.style.display = "none"; });
      grid.appendChild(a);
    });
  </script>
</body>
